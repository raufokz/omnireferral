name: Deploy to Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DEPLOY_PATH: /home/u867057961/omnireferral

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup PHP environment
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, gd, pdo_mysql
          tools: composer

      # 3️⃣ Install dependencies & build assets
      - name: Install dependencies & build
        run: |
          composer install --no-dev --prefer-dist --no-interaction --no-progress
          npm ci
          npm run build
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      # 4️⃣ Setup SSH key
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}

      # 5️⃣ Test SSH connection
      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "echo SSH connection successful!"
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}

      # 6️⃣ Ensure public_html symlink points to Laravel public folder
      - name: Ensure public_html -> public symlink
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" <<'EOF'
            set -e
            TARGET=/home/u867057961/omnireferral/public
            LINK=/home/u867057961/domains/omnireferral.us/public_html
            if [ -L "$LINK" ]; then
              echo "Symlink already present: $LINK -> $(readlink $LINK)"
            else
              if [ -e "$LINK" ] && [ ! -L "$LINK" ]; then
                mv "$LINK" "${LINK}_backup_$(date +%s)"
              fi
              ln -s "$TARGET" "$LINK"
              echo "Symlink created: $LINK -> $TARGET"
            fi
          EOF
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}

      # 7️⃣ Rsync project files to server (outside webroot)
      - name: Deploy via Rsync
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude "storage/logs/*.log" \
            --rsync-path="mkdir -p $DEPLOY_PATH && rsync" \
            -e "ssh -i ~/.ssh/id_ed25519 -p $SSH_PORT" \
            ./ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH"
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}

      # 8️⃣ Post-deploy Artisan commands
      - name: Post-deploy Artisan commands
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" <<'EOF'
            set -e
            cd /home/u867057961/omnireferral
            php artisan migrate --force
            php artisan storage:link
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
          EOF
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
