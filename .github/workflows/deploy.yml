name: Deploy to Hostinger
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, gd, pdo_mysql
          tools: composer

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & build
        run: |
          composer install --no-dev --prefer-dist --no-interaction --no-progress
          npm ci
          npm run build
          # DO NOT run artisan cache here!

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}

      - name: Deploy via Rsync
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude "storage" \
            --exclude "bootstrap/cache" \
            --exclude ".env" \
            -e "ssh -i ~/.ssh/id_ed25519 -p $SSH_PORT" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/u867057961/omnireferral/
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}

      - name: Post-deploy setup
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" <<'EOF'
            set -e
            cd /home/u867057961/omnireferral

            # Create Laravel storage & cache folders (rsync deletes them)
            mkdir -p storage/app/public
            mkdir -p storage/framework/{cache,sessions,views}
            mkdir -p storage/logs
            mkdir -p bootstrap/cache

            # Set correct permissions
            chmod -R 775 storage bootstrap/cache

            # Symlink public_html to public
            LINK=/home/u867057961/domains/omnireferral.us/public_html
            TARGET=/home/u867057961/omnireferral/public
            if [ ! -L "$LINK" ]; then
              [ -e "$LINK" ] && mv "$LINK" "${LINK}_backup_$(date +%s)"
              ln -s "$TARGET" "$LINK"
            fi

            # Laravel post-deploy commands
            php artisan storage:link || true
            php artisan migrate --force
            php artisan optimize:clear
            php artisan optimize
          EOF
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
