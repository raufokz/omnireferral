name: Deploy to Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  APP_DIR: /home/u867057961/omnireferral
  DOMAIN_DIR: /home/u867057961/domains/omnireferrals.com
  DOMAIN_PUBLIC: /home/u867057961/domains/omnireferrals.com/public_html

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, intl, gd, pdo_mysql, zip
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies and build
        run: |
          composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader
          npm ci
          mkdir -p resources/css/app/overrides
          touch resources/css/app/overrides/57-responsive-hardening.css
          npm run build
          rm -rf node_modules

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "$SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -T 20 -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "echo Connected successfully"

      - name: Ensure target directories exist
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            mkdir -p '${APP_DIR}' &&
            mkdir -p '${DOMAIN_DIR}' &&
            mkdir -p '${DOMAIN_PUBLIC}' &&
            mkdir -p '${APP_DIR}/storage/app/public' &&
            mkdir -p '${APP_DIR}/storage/framework/cache' &&
            mkdir -p '${APP_DIR}/storage/framework/sessions' &&
            mkdir -p '${APP_DIR}/storage/framework/views' &&
            mkdir -p '${APP_DIR}/storage/logs' &&
            mkdir -p '${APP_DIR}/bootstrap/cache'
          "

      - name: Deploy via Rsync
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          rsync -avz --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude ".env" \
            --exclude "storage" \
            --exclude "bootstrap/cache/*.php" \
            --exclude "*.log" \
            -e "ssh -i ~/.ssh/id_rsa -p $SSH_PORT -o StrictHostKeyChecking=no" \
            ./ "$SSH_USER@$SSH_HOST:${APP_DIR}/"

      - name: Post-deploy commands
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << EOF
            set -e
            cd "${APP_DIR}"

            mkdir -p storage/app/public storage/framework/cache storage/framework/sessions storage/framework/views storage/logs bootstrap/cache

            if [ ! -f ".env" ]; then
              echo "ERROR: .env file missing at ${APP_DIR}/.env"
              exit 1
            fi

            rm -rf public/storage
            ln -s "${APP_DIR}/storage/app/public" "${APP_DIR}/public/storage" || true

            rm -rf "${DOMAIN_PUBLIC}"
            ln -sfn "${APP_DIR}/public" "${DOMAIN_PUBLIC}"

            find . -type f -exec chmod 644 {} \;
            find . -type d -exec chmod 755 {} \;
            chmod -R 775 storage bootstrap/cache

            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan migrate --force

            echo "Deployment finished successfully for omnireferrals.com"
          EOF
